carla_prediction_node:
  ros__parameters:
    model_ckpt: ""                          # à remplir : chemin absolu vers le .ckpt
    config_path: ""                         # défaut : CarlaPrediction/config.yaml
    osm_path: ""                            # défaut : CarlaPrediction/data/maps/Town03.osm
    publish_hz: 2.0                         # fréquence d'inférence (Hz)
    past_frames: 5                          # frames d'historique pour le modèle
    raw_fps: 20                             # fréquence brute du bridge CARLA
    max_agents: 10                          # max agents (config.yaml)
    max_agent_distance: 50.0               # (m) seuil de distance pour sélectionner les agents
